name: Paradise Lost

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:

jobs:
  post-line:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r paradise-lost/requirements.txt

      - name: Post next line to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.PARADISE_LOST_CHANNEL_ID }}
        run: python paradise-lost/notifier.py
