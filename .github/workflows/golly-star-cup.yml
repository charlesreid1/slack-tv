name: Star Cup Notifier

on:
  schedule:
    # Hourly, Monday 00:00 Pacific through Wednesday 00:00 Pacific.
    # In UTC (PDT, UTC-7): Monday 07:00 UTC through Wednesday 07:00 UTC.
    # Script checks exact Pacific time window; cron provides UTC coverage.
    - cron: '1 7-23 * * 1'
    - cron: '1 * * * 2'
    - cron: '1 0-6 * * 3'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r golly-notifier/requirements.txt

      - name: Run Star Cup notifier
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.GOLLY_NOTIFIER_CHANNEL_ID }}
        run: python golly-notifier/notifier.py star
