name: Hellmouth Cup Notifier

on:
  schedule:
    # Hourly, Friday 00:00 Pacific through Sunday 20:00 Pacific.
    # In UTC (PDT, UTC-7): Friday 07:00 UTC through Monday 03:00 UTC.
    # Script checks exact Pacific time window; cron provides UTC coverage.
    - cron: '1 7-23 * * 5'
    - cron: '1 * * * 6'
    - cron: '1 * * * 0'
    - cron: '1 0-3 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r golly-notifier/requirements.txt

      - name: Run Hellmouth Cup notifier
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.GOLLY_NOTIFIER_CHANNEL_ID }}
        run: python golly-notifier/notifier.py hellmouth
