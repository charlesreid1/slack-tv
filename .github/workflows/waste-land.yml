name: The Waste Land

on:
  schedule:
    - cron: '35 * * * *'
  workflow_dispatch:

jobs:
  post-line:
    runs-on: ubuntu-latest
    # Disable automatic checkout in Gitea Actions
    steps:
      - name: Skip automatic checkout
        run: echo "Skipping automatic checkout"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r waste-land/requirements.txt

      - name: Post next line to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.WASTE_LAND_CHANNEL_ID }}
        run: python waste-land/notifier.py
