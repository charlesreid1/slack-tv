name: The Waste Land

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post-line:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout channel directory
        uses: actions/checkout@v5
        with:
          sparse-checkout: waste-land
          sparse-checkout-cone-mode: true

      - name: Post next line to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.WASTE_LAND_CHANNEL_ID }}
        run: python waste-land/notifier.py
